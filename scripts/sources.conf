# sources.conf - 上游规则源配置
#
# 格式: RULE_NAME|SOURCE_TYPE|URL
#
# SOURCE_TYPE 说明:
#   meta-geosite     - MetaCubeX classical geosite .list 文件 (通过 git sparse-checkout 获取)
#   meta-geosite-full - MetaCubeX geo (非 lite) classical geosite .list
#   meta-geoip       - MetaCubeX classical geoip .list 文件
#   meta-geoip-full  - MetaCubeX geo (非 lite) classical geoip .list
#   surge            - blackmatrix7 Surge 格式 .list 文件 (通过 git sparse-checkout 获取)
#   curl-surge       - 通过 curl 下载的 Surge classical 格式
#   curl-sukka       - SukkaW Surge conf 格式 (需要去除 skk.moe 注释行)
#   curl-clash       - Clash classical 格式 (ACL4SSR 等)
#   curl-v2ray       - Loyalsoldier v2ray-rules-dat proxy-list 格式
#   curl-domain-list - domain-list-community / domain-list-custom / v2ray 文本格式
#   curl-dnsmasq     - felixonmars dnsmasq 格式
#   curl-hosts       - hosts 格式 (0.0.0.0 domain)
#   curl-iplist      - 纯 IP/CIDR 列表 (每行一个)
#   curl-singbox-json - sing-box rule-set JSON 格式
#
# ============================================================================
# Git 仓库源 (通过 sparse-checkout 批量获取)
# ============================================================================
#
# 设计原则:
#   1. MetaCubeX/meta-rules-dat 作为各规则集主基底
#   2. 其他上游只做补充，不替代主基底
#   3. 优先使用 geo/full，覆盖优先于体积
#
# MetaCubeX/meta-rules-dat (meta 分支)
#   geo-lite 路径: geo-lite/geosite/classical/ 和 geo-lite/geoip/classical/
#   geo 完整路径:  geo/geosite/classical/ 和 geo/geoip/classical/
#
# blackmatrix7/ios_rule_script (master 分支)
#   路径: rule/Surge/{Name}/{Name}.list 或 {Name}_All.list
#
# ============================================================================

# ----------------------------
# Apple
# ----------------------------
apple-domain|meta-geosite-full|apple
apple-domain|surge|Apple/Apple_All

apple-ip|meta-geoip-full|apple

